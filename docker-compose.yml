services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskxpro-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: taskxpro
      DB_USERNAME: taskxpro
      DB_PASSWORD: secret
    volumes:
      - ./:/var/www
      - storage:/var/www/storage
      - bootstrap_cache:/var/www/bootstrap/cache
      - ./php/upload.ini:/usr/local/etc/php/conf.d/upload.ini:ro
    networks:
      - taskxpro-network
    depends_on:
      - db

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskxpro-scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    environment:
      SERVICE_NAME: scheduler
      SERVICE_TAGS: dev
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: taskxpro
      DB_USERNAME: taskxpro
      DB_PASSWORD: secret
    volumes:
      - ./:/var/www
      - storage:/var/www/storage
      - bootstrap_cache:/var/www/bootstrap/cache
      - ./php/upload.ini:/usr/local/etc/php/conf.d/upload.ini:ro
    networks:
      - taskxpro-network
    depends_on:
      - db

  web:
    image: nginx:alpine
    container_name: taskxpro-web
    restart: unless-stopped
    tty: true
    ports:
      - "${WEB_PORT:-8020}:80"
    volumes:
      - ./:/var/www
      - storage:/var/www/storage:ro
      - ./nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - taskxpro-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: taskxpro-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: taskxpro
      MYSQL_USER: taskxpro
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - taskxpro-network

networks:
  taskxpro-network:
    driver: bridge

volumes:
  storage:
  bootstrap_cache:
  db_data: